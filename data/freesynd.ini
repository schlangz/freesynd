# freesynd data files directory.
# If empty, uses default value per platform
# On Windows, defaults to the freesynd folder + "data".
# On Mac, defaults to an internal path that refers to the application bundle.
# Everywhere else, defaults to $PREFIX/share/freesynd/data
# Examples: freesynd_data_dir = C:\freesynd\data
freesynd_data_dir =

# original game data files directory - defaults to freesynd_data_dir
# only set this if you want to keep the two data sets separate
# Examples: data_dir = C:\games\synd\DATA
data_dir =

# timeout to distinguish between click and dragging event
time_for_click = 80

# How menu screens (world map, agent selection, etc.) scale to fill the
# window. false (default): scale continuously so the menu fills as much of
# the window as possible at any size. true: classic pixel-perfect scaling,
# only scaling at whole multiples of the base resolution (may leave black
# bars at in-between window sizes).
menu_integer_scaling = false
